# Local development stack: TimescaleDB-enabled Postgres only.
# The app itself runs on the host during development (uv run uvicorn ...),
# with GLASSHOUSE_MORPHOLOG_BIN pointing at a locally built morpholog binary.
#
# Postgres floor is 17 (matching Morpholog); CI exercises this same
# PG17 Timescale image, the demo leads on 18.
services:
  db:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: glasshouse
      POSTGRES_PASSWORD: glasshouse
      POSTGRES_DB: glasshouse
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glasshouse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
