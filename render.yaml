# Render Blueprint: the DEMO profile (DESIGN.md section 13).
# Deliberately minimal: one web service with the background-thread
# projector, one managed Postgres, one nightly reset job. The separate
# worker (outbox + projector) is the production-like profile and joins a
# deployment only when external effects or projection lag force it.
#
# Database: Render managed Postgres 18. TimescaleDB is supported on
# Render managed Postgres (PG13+, for databases created after 12/01/2023),
# but only its Apache-2 subset - "Community features are not available"
# (https://render.com/docs/postgresql-extensions). That is enough here:
# the app uses core hypertables (chunk exclusion) only; continuous
# aggregates and compression (TSL) are not used, which also keeps the
# stack Apache-2. The Alembic migration runs CREATE EXTENSION timescaledb
# (the preDeployCommand below), so the extension is provisioned at deploy.
# Worth one live confirmation that create_hypertable succeeds on the plan
# before the demo leans on it.

services:
  - type: web
    name: glasshouse-web
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    preDeployCommand: uv run alembic upgrade head
    envVars:
      - key: GLASSHOUSE_ENVIRONMENT
        value: demo
      - key: GLASSHOUSE_DATABASE_URL
        fromDatabase:
          name: glasshouse-db
          property: connectionString

  - type: cron
    name: glasshouse-seed-reset
    runtime: docker
    schedule: "30 2 * * *"
    dockerCommand: uv run python -m glasshouse.cli seed --reset
    envVars:
      - key: GLASSHOUSE_ENVIRONMENT
        value: demo
      - key: GLASSHOUSE_DATABASE_URL
        fromDatabase:
          name: glasshouse-db
          property: connectionString

databases:
  - name: glasshouse-db
    plan: basic-256mb
    postgresMajorVersion: "18"
