name: Docker build

# The deployment image builds the pinned morpholog from source with its
# own Rust base image; the CI integration job builds with a different
# toolchain (dtolnay/rust-toolchain@stable), so a Dockerfile-only break -
# a base image older than the pin's MSRV, a bad COPY - is invisible
# there. This smoke build closes that "deployment binary differs from the
# CI binary" gap. It runs only when the image's inputs change: the build
# is a full cargo release, not worth paying on every PR.

on:
  push:
    branches: [main]
    paths: [Dockerfile, pyproject.toml, uv.lock, .github/workflows/docker-build.yml]
  pull_request:
    paths: [Dockerfile, pyproject.toml, uv.lock, .github/workflows/docker-build.yml]
  workflow_dispatch: {}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
