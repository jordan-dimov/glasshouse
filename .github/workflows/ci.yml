name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The pure leg: format, lint, types, and the tests that need no
  # binary or database (integration modules skip cleanly).
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv lock --check
      - run: uv sync --dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest

  # The live leg: a pinned morpholog build against the same TimescaleDB
  # image compose uses, running the FULL suite - the needle lifecycle,
  # the client drift check (regenerate-and-diff + the model hash
  # assertion), imports through the real batch surface, the projector's
  # rebuild-from-zero equality - with the coverage gate on top.
  #
  # MORPHOLOG_REF pins the substrate; re-pin it in the same PR that
  # adopts a new upstream surface, never silently.
  integration:
    runs-on: ubuntu-latest
    env:
      MORPHOLOG_REF: 6556a6c0188c84ef1d7a42943230588116e25ea5
    services:
      postgres:
        image: timescale/timescaledb:latest-pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: morpholog_scratch
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: jordan-dimov/morpholog
          ref: ${{ env.MORPHOLOG_REF }}
          path: morpholog
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: morpholog
      - run: cargo build --release --manifest-path morpholog/Cargo.toml
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
      - run: uv sync --dev
      # The live tests skip when their prerequisites are unreachable -
      # right for developer machines, wrong here, where running them is
      # the job's whole point. Fail loudly before pytest can skip
      # quietly. (The coverage gate backstops this too: a mass-skip
      # would fall far below the threshold.)
      - name: Assert live prerequisites are visible
        env:
          GLASSHOUSE_MORPHOLOG_REPO: ${{ github.workspace }}/morpholog
          GLASSHOUSE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/morpholog_scratch
        run: |
          test -x "$GLASSHOUSE_MORPHOLOG_REPO/target/release/morpholog"
          psql "$GLASSHOUSE_TEST_DATABASE_URL" -qc 'select 1'
      - name: Full suite, integration legs live, coverage gated
        env:
          GLASSHOUSE_MORPHOLOG_REPO: ${{ github.workspace }}/morpholog
          GLASSHOUSE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/morpholog_scratch
          # Refuse to skip the live legs from inside pytest too, not only
          # the shell preflight above: a green run here must have run them.
          GLASSHOUSE_REQUIRE_LIVE: "1"
        run: uv run pytest --cov --cov-fail-under=95
