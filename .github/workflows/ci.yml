name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      # The client drift contract needs the morpholog binary, so both
      # legs run in the env-gated integration tests: regenerate the
      # committed morpholog_client package and diff, and assert the
      # committed MODEL_HASH against `morpholog hash`.

  # A Postgres {17, 18} x TimescaleDB service matrix joins this workflow
  # when the first database-backed tests land (v0 needle).
