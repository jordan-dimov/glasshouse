name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      # The pure leg of the codegen drift contract: generated.py must
      # match the committed manifest. The manifest-matches-the-.morph
      # leg needs the morpholog binary and runs in the env-gated
      # integration test (model_hash() == MODEL_HASH).
      - run: uv run python scripts/generate_commit_models.py --check

  # A Postgres {17, 18} x TimescaleDB service matrix joins this workflow
  # when the first database-backed tests land (v0 needle).
