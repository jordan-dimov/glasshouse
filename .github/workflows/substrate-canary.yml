name: Substrate canary

# The integration job in ci.yml runs the PINNED morpholog, by design: a
# merge gate must be reproducible. The cost is that upstream wire drift
# (an envelope reshaped, a CLI verb renamed) stays invisible until
# someone re-pins - exactly how the `verify` envelope change slipped past
# us until a re-pin caught it the hard way.
#
# This job closes that gap: it builds morpholog HEAD (the default branch)
# and runs the full live suite against it on a schedule. It is NOT a
# merge gate - it never runs on a pull request, and its failure blocks
# nothing. A red canary means "the next re-pin will need work": adopt the
# new surface deliberately, or report the friction upstream.

on:
  schedule:
    # Monday 06:17 UTC - the Monday-morning loop, one day ahead of the week.
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: substrate-canary
  cancel-in-progress: true

jobs:
  canary:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: morpholog_scratch
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      # No ref: the default branch HEAD - the whole point is "latest",
      # not the pin ci.yml validates.
      - uses: actions/checkout@v7
        with:
          repository: jordan-dimov/morpholog
          path: morpholog
      - name: Record the morpholog HEAD under test
        run: git -C morpholog rev-parse HEAD
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: morpholog
      - run: cargo build --release --manifest-path morpholog/Cargo.toml
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --dev
      - name: Assert live prerequisites are visible
        env:
          GLASSHOUSE_MORPHOLOG_REPO: ${{ github.workspace }}/morpholog
          GLASSHOUSE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/morpholog_scratch
        run: |
          test -x "$GLASSHOUSE_MORPHOLOG_REPO/target/release/morpholog"
          psql "$GLASSHOUSE_TEST_DATABASE_URL" -qc 'select 1'
      # The full live suite against HEAD. No coverage gate: this job is
      # about wire/behaviour drift, which surfaces as test failures (a
      # reshaped envelope stops parsing, a renamed verb stops resolving),
      # not as a coverage dip. REQUIRE_LIVE keeps the live legs from
      # skipping quietly, so a green canary really did exercise HEAD.
      - name: Full suite against morpholog HEAD
        env:
          GLASSHOUSE_MORPHOLOG_REPO: ${{ github.workspace }}/morpholog
          GLASSHOUSE_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/morpholog_scratch
          GLASSHOUSE_REQUIRE_LIVE: "1"
        run: uv run pytest
